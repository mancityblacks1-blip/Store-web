<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Electro Amazon Pro</title>

<style>

/* ================================
GLOBAL
================================ */

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

.hidden{display:none}

.container{padding:20px}

/* ================================
HEADER
================================ */

header{
background:#131921;
color:white;
display:flex;
align-items:center;
padding:10px 20px;
gap:20px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#ff9900;
}

.search{
flex:1;
display:flex;
}

.search input{
flex:1;
padding:10px;
border:none;
}

.search button{
background:#febd69;
border:none;
padding:10px 15px;
cursor:pointer;
}

nav button{
background:#232f3e;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
margin-left:5px;
}

/* ================================
GRID
================================ */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* ================================
PRODUCT CARD
================================ */

.card{
background:white;
padding:15px;
border-radius:6px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.price{
color:#b12704;
font-weight:bold;
}

.rating{color:#ffa41c}

/* ================================
BUTTON
================================ */

.btn{
background:#ffd814;
border:none;
padding:8px;
cursor:pointer;
margin-top:5px;
width:100%;
}

/* ================================
ADMIN
================================ */

.admin{
display:grid;
grid-template-columns:220px 1fr;
height:100vh;
}

.sidebar{
background:#111;
color:white;
padding:20px;
}

.sidebar div{
margin-bottom:15px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:8px;
}

</style>

</head>

<body>

<header>

<div class="logo">ElectroAmazon</div>

<div class="search">
<input id="searchBox" placeholder="Search electronics">
<button onclick="searchProducts()">Search</button>
</div>

<nav>

<button onclick="page('home')">Home</button>
<button onclick="page('products')">Products</button>
<button onclick="page('wishlist')">Wishlist</button>
<button onclick="page('cart')">Cart (<span id="cartCount">0</span>)</button>
<button onclick="page('orders')">Orders</button>
<button onclick="page('login')">Login</button>

</nav>

</header>

<div class="container">

<div id="home">

<h2>Featured Products</h2>

<div class="grid" id="featured"></div>

</div>

<div id="products" class="hidden">

<h2>Products</h2>

<label>Max Price</label>
<input type="range" min="50" max="2000" value="2000" id="priceFilter">

<div class="grid" id="productGrid"></div>

</div>

<div id="wishlist" class="hidden">

<h2>Wishlist</h2>

<div class="grid" id="wishlistGrid"></div>

</div>

<div id="cart" class="hidden">

<h2>Cart</h2>

<div id="cartItems"></div>

<h3>Total $<span id="cartTotal"></span></h3>

<button class="btn" onclick="page('checkout')">Checkout</button>

</div>

<div id="checkout" class="hidden">

<h2>Checkout</h2>

<select id="paymentMethod">

<option>Visa / Mastercard</option>
<option>InstaPay</option>
<option>Vodafone Cash</option>

</select>

<button class="btn" onclick="placeOrder()">Pay</button>

</div>

<div id="orders" class="hidden">

<h2>Order Tracking</h2>

<div id="ordersList"></div>

</div>

<div id="login" class="hidden">

<h2>Login</h2>

<input id="username" placeholder="username"><br><br>
<input id="password" type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>

</div>

</div>

<div id="adminPanel" class="hidden admin">

<div class="sidebar">

<h3>Admin</h3>

<div onclick="adminPage('dashboard')">Dashboard</div>
<div onclick="adminPage('products')">Products</div>
<div onclick="adminPage('orders')">Orders</div>
<div onclick="adminPage('users')">Users</div>
<div onclick="location.reload()">Exit</div>

</div>

<div id="adminContent"></div>

</div>

<script>

/* ================================
DATABASE
================================ */

let products=JSON.parse(localStorage.getItem("products"))||[]
let cart=JSON.parse(localStorage.getItem("cart"))||[]
let orders=JSON.parse(localStorage.getItem("orders"))||[]
let wishlist=JSON.parse(localStorage.getItem("wishlist"))||[]

function save(){

localStorage.setItem("products",JSON.stringify(products))
localStorage.setItem("cart",JSON.stringify(cart))
localStorage.setItem("orders",JSON.stringify(orders))
localStorage.setItem("wishlist",JSON.stringify(wishlist))

}

/* ================================
GENERATE DEMO PRODUCTS
================================ */

function generateProducts(){

if(products.length) return

for(let i=1;i<=50;i++){

products.push({

id:i,
name:"Electronic Product "+i,
price:Math.floor(Math.random()*1500)+100,
rating:Math.floor(Math.random()*5)+1,
stock:Math.floor(Math.random()*50),
img:"https://picsum.photos/300?random="+i

})

}

save()

}

/* ================================
ROUTER
================================ */

function page(id){

document.querySelectorAll(".container>div")
.forEach(x=>x.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}

/* ================================
RENDER PRODUCTS
================================ */

function renderProducts(){

let max=document.getElementById("priceFilter").value

let grid=document.getElementById("productGrid")

grid.innerHTML=""

products.filter(p=>p.price<=max).forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p class="price">$${p.price}</p>

<p class="rating">⭐ ${p.rating}</p>

<button class="btn" onclick="addCart(${p.id})">Add to Cart</button>

<button onclick="addWishlist(${p.id})">❤️</button>

</div>

`

})

}

/* ================================
FEATURED
================================ */

function renderFeatured(){

let f=document.getElementById("featured")

f.innerHTML=""

products.slice(0,8).forEach(p=>{

f.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p class="price">$${p.price}</p>

<button class="btn" onclick="addCart(${p.id})">Add</button>

</div>

`

})

}

/* ================================
CART
================================ */

function addCart(id){

let p=products.find(x=>x.id==id)

cart.push(p)

save()

updateCart()

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length

let items=document.getElementById("cartItems")

items.innerHTML=""

let total=0

cart.forEach((c,i)=>{

total+=c.price

items.innerHTML+=`

<div>

${c.name} - $${c.price}

<button onclick="removeCart(${i})">X</button>

</div>

`

})

document.getElementById("cartTotal").innerText=total

}

function removeCart(i){

cart.splice(i,1)

save()

updateCart()

}

/* ================================
WISHLIST
================================ */

function addWishlist(id){

wishlist.push(id)

save()

}

/* ================================
SEARCH
================================ */

function searchProducts(){

let q=document.getElementById("searchBox").value.toLowerCase()

let grid=document.getElementById("productGrid")

grid.innerHTML=""

products.filter(p=>p.name.toLowerCase().includes(q))
.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>$${p.price}</p>

<button onclick="addCart(${p.id})">Add</button>

</div>

`

})

}

/* ================================
CHECKOUT
================================ */

function placeOrder(){

orders.push({

id:Date.now(),
date:new Date().toLocaleString(),
items:[...cart],
status:"Processing"

})

cart=[]

save()

updateCart()

renderOrders()

page("orders")

}

/* ================================
ORDERS
================================ */

function renderOrders(){

let o=document.getElementById("ordersList")

o.innerHTML=""

orders.forEach(order=>{

o.innerHTML+=`

<div class="card">

<h4>Order ${order.id}</h4>

<p>Status: ${order.status}</p>

<p>${order.items.length} items</p>

</div>

`

})

}

/* ================================
LOGIN
================================ */

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

if(u==="admin" && p==="admin123"){

document.querySelector(".container").classList.add("hidden")
document.getElementById("adminPanel").classList.remove("hidden")

adminPage("dashboard")

return

}

alert("User logged")

}

/* ================================
ADMIN
================================ */

function adminPage(section){

let c=document.getElementById("adminContent")

if(section==="dashboard"){

let revenue=orders.reduce((t,o)=>t+
o.items.reduce((s,i)=>s+i.price,0),0)

c.innerHTML=`

<h2>Dashboard</h2>

<p>Total Orders: ${orders.length}</p>
<p>Total Revenue: $${revenue}</p>
<p>Total Products: ${products.length}</p>

`

}

}

/* ================================
INIT
================================ */

document.getElementById("priceFilter").oninput=renderProducts

generateProducts()

renderProducts()
renderFeatured()
updateCart()
renderOrders()

</script>

</body>
</html>
