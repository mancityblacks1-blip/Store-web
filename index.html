<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectroShop</title>

<style>

:root{
--primary:#0a66ff;
--bg:#f5f6fa;
--card:#ffffff;
--text:#222;
}

body.dark{
--bg:#1e1e1e;
--card:#2a2a2a;
--text:#eee;
}

body{
font-family:Arial;
background:var(--bg);
margin:0;
color:var(--text);
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header input{
padding:8px;
width:200px;
}

nav button{
margin-left:10px;
padding:8px 12px;
cursor:pointer;
}

.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

button.primary{
background:var(--primary);
color:white;
border:none;
padding:8px 10px;
cursor:pointer;
margin-top:5px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.hidden{
display:none;
}

.admin{
display:grid;
grid-template-columns:200px 1fr;
height:100vh;
}

.sidebar{
background:#111;
color:white;
padding:20px;
}

.sidebar div{
margin-bottom:15px;
cursor:pointer;
}

.admin-content{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

.notification{
position:fixed;
bottom:20px;
right:20px;
background:#0a66ff;
color:white;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<header>
<h2>ElectroShop</h2>

<input id="search" placeholder="Search products">

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('products')">Products</button>
<button onclick="showPage('cart')">Cart (<span id="cartCount">0</span>)</button>
<button onclick="showPage('orders')">Orders</button>
<button onclick="showPage('login')">Login</button>
<button onclick="toggleDark()">🌙</button>
</nav>
</header>

<div class="container">

<div id="home">
<h2>Featured Products</h2>
<div class="products" id="homeProducts"></div>
</div>

<div id="products" class="hidden">
<h2>All Products</h2>

<label>Max Price</label>
<input type="range" min="50" max="2000" value="2000" id="priceFilter">

<div class="products" id="productList"></div>
</div>

<div id="cart" class="hidden">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: $<span id="cartTotal">0</span></h3>
<button class="primary" onclick="showPage('checkout')">Checkout</button>
</div>

<div id="checkout" class="hidden">
<h2>Checkout</h2>

<select id="payment">
<option>Visa / Mastercard</option>
<option>InstaPay</option>
<option>Vodafone Cash</option>
</select>

<button class="primary" onclick="placeOrder()">Place Order</button>
</div>

<div id="orders" class="hidden">
<h2>Order History</h2>
<div id="orderList"></div>
</div>

<div id="login" class="hidden">
<h2>Login</h2>

<input id="username" placeholder="Username"><br><br>
<input id="password" placeholder="Password" type="password"><br><br>

<button onclick="login()">Login</button>
</div>

</div>

<div id="adminPanel" class="hidden admin">

<div class="sidebar">
<h3>Admin</h3>

<div onclick="adminView('products')">Products</div>
<div onclick="adminView('orders')">Orders</div>
<div onclick="adminView('stats')">Stats</div>
<div onclick="location.reload()">Exit</div>

</div>

<div class="admin-content" id="adminContent"></div>

</div>

<div id="notify" class="notification hidden"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || []
let cart = JSON.parse(localStorage.getItem("cart")) || []
let orders = JSON.parse(localStorage.getItem("orders")) || []
let users = JSON.parse(localStorage.getItem("users")) || []

function notify(msg){
let n=document.getElementById("notify")
n.innerText=msg
n.classList.remove("hidden")
setTimeout(()=>n.classList.add("hidden"),2000)
}

function save(){
localStorage.setItem("products",JSON.stringify(products))
localStorage.setItem("cart",JSON.stringify(cart))
localStorage.setItem("orders",JSON.stringify(orders))
localStorage.setItem("users",JSON.stringify(users))
}

function generateProducts(){

if(products.length>0)return

products=[
{id:1,name:"iPhone 14",price:999,img:"https://picsum.photos/300?1"},
{id:2,name:"Samsung S23",price:850,img:"https://picsum.photos/300?2"},
{id:3,name:"MacBook Pro",price:1800,img:"https://picsum.photos/300?3"},
{id:4,name:"Dell XPS",price:1500,img:"https://picsum.photos/300?4"},
{id:5,name:"Sony Headphones",price:300,img:"https://picsum.photos/300?5"},
{id:6,name:"Apple Watch",price:450,img:"https://picsum.photos/300?6"},
{id:7,name:"Gaming Mouse",price:80,img:"https://picsum.photos/300?7"},
{id:8,name:"Mechanical Keyboard",price:120,img:"https://picsum.photos/300?8"},
{id:9,name:"iPad Pro",price:900,img:"https://picsum.photos/300?9"},
{id:10,name:"Smart TV",price:1200,img:"https://picsum.photos/300?10"},
{id:11,name:"Bluetooth Speaker",price:150,img:"https://picsum.photos/300?11"},
{id:12,name:"Power Bank",price:50,img:"https://picsum.photos/300?12"}
]

save()

}

function renderProducts(){

let list=document.getElementById("productList")
list.innerHTML=""

let max=document.getElementById("priceFilter").value

products.filter(p=>p.price<=max).forEach(p=>{

list.innerHTML+=`
<div class="card">

<img src="${p.img}">
<h4>${p.name}</h4>
<p>$${p.price}</p>

<button class="primary" onclick="addCart(${p.id})">
Add to Cart
</button>

</div>
`
})

}

function renderHome(){

let home=document.getElementById("homeProducts")
home.innerHTML=""

products.slice(0,4).forEach(p=>{
home.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>$${p.price}</p>
<button onclick="addCart(${p.id})">Add</button>
</div>
`
})

}

function addCart(id){

let p=products.find(x=>x.id==id)
cart.push(p)

save()
updateCart()

notify("Added to cart")

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length

let items=document.getElementById("cartItems")
items.innerHTML=""

let total=0

cart.forEach((c,i)=>{
total+=c.price

items.innerHTML+=`
<div class="cart-item">
${c.name} - $${c.price}
<button onclick="removeCart(${i})">X</button>
</div>
`
})

document.getElementById("cartTotal").innerText=total

}

function removeCart(i){
cart.splice(i,1)
save()
updateCart()
}

function placeOrder(){

if(cart.length==0)return

orders.push({
date:new Date().toLocaleString(),
items:[...cart]
})

cart=[]
save()

updateCart()
renderOrders()

notify("Order placed!")

showPage("orders")

}

function renderOrders(){

let o=document.getElementById("orderList")
o.innerHTML=""

orders.forEach(order=>{
o.innerHTML+=`
<div class="card">
<h4>${order.date}</h4>
<p>${order.items.length} items</p>
</div>
`
})

}

function showPage(id){

document.querySelectorAll(".container>div")
.forEach(p=>p.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

if(u=="admin" && p=="admin123"){

document.querySelector(".container").classList.add("hidden")
document.getElementById("adminPanel").classList.remove("hidden")

adminView("products")

return
}

notify("Logged in")

}

function adminView(section){

let c=document.getElementById("adminContent")

if(section=="products"){

c.innerHTML=`

<h2>Products</h2>

<button onclick="addProduct()">Add Product</button>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Delete</th>
</tr>

${products.map(p=>`
<tr>
<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.price}</td>
<td><button onclick="deleteProduct(${p.id})">X</button></td>
</tr>
`).join("")}

</table>
`
}

if(section=="orders"){

c.innerHTML=`
<h2>Orders</h2>

${orders.map(o=>`
<div class="card">
${o.date} - ${o.items.length} items
</div>
`).join("")}

`
}

if(section=="stats"){

let revenue=orders.reduce((t,o)=>t+
o.items.reduce((s,i)=>s+i.price,0),0)

c.innerHTML=`
<h2>Sales Stats</h2>

<p>Total Orders: ${orders.length}</p>
<p>Total Revenue: $${revenue}</p>

`
}

}

function deleteProduct(id){
products=products.filter(p=>p.id!=id)
save()
adminView("products")
}

function addProduct(){

let name=prompt("Product name")
let price=prompt("Price")
let img="https://picsum.photos/300?random="+Math.random()

products.push({
id:Date.now(),
name,
price,
img
})

save()
adminView("products")

}

function toggleDark(){
document.body.classList.toggle("dark")
}

document.getElementById("search").oninput=e=>{

let q=e.target.value.toLowerCase()

let list=document.getElementById("productList")

list.innerHTML=""

products
.filter(p=>p.name.toLowerCase().includes(q))
.forEach(p=>{

list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>$${p.price}</p>
<button onclick="addCart(${p.id})">Add</button>
</div>
`
})

}

document.getElementById("priceFilter").oninput=renderProducts

generateProducts()
renderProducts()
renderHome()
updateCart()
renderOrders()

</script>

</body>
</html>
