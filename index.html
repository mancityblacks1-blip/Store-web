<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ElectroShop</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f6fa;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav button{
margin-left:10px;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.hidden{
display:none;
}

button{
padding:8px;
cursor:pointer;
}

.admin{
display:grid;
grid-template-columns:220px 1fr;
height:100vh;
}

.sidebar{
background:#111;
color:white;
padding:20px;
}

.sidebar div{
margin-bottom:15px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

.badge{
background:red;
color:white;
padding:2px 6px;
border-radius:5px;
}

</style>

</head>

<body>

<header>

<h2>ElectroShop</h2>

<input id="search" placeholder="Search">

<nav>

<button onclick="show('home')">Home</button>
<button onclick="show('products')">Products</button>
<button onclick="show('cart')">Cart <span id="cartCount">0</span></button>
<button onclick="show('orders')">Orders</button>
<button onclick="show('login')">Login</button>

</nav>

</header>

<div class="container">

<div id="home">

<h2>Featured</h2>

<div class="grid" id="featured"></div>

</div>

<div id="products" class="hidden">

<h2>Products</h2>

<label>Max Price</label>

<input type="range" min="50" max="2000" value="2000" id="priceFilter">

<div class="grid" id="productList"></div>

</div>

<div id="cart" class="hidden">

<h2>Cart</h2>

<div id="cartItems"></div>

<h3>Total $<span id="cartTotal"></span></h3>

<button onclick="show('checkout')">Checkout</button>

</div>

<div id="checkout" class="hidden">

<h2>Checkout</h2>

<select id="payment">

<option>Visa / Mastercard</option>
<option>InstaPay</option>
<option>Vodafone Cash</option>

</select>

<button onclick="placeOrder()">Pay</button>

</div>

<div id="orders" class="hidden">

<h2>Order Tracking</h2>

<div id="orderList"></div>

</div>

<div id="login" class="hidden">

<h2>Login</h2>

<input id="user" placeholder="username"><br><br>

<input id="pass" type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>

</div>

</div>

<div id="adminPanel" class="hidden admin">

<div class="sidebar">

<h3>Admin</h3>

<div onclick="adminPage('dashboard')">Dashboard</div>
<div onclick="adminPage('products')">Products</div>
<div onclick="adminPage('orders')">Orders</div>
<div onclick="adminPage('users')">Users</div>
<div onclick="location.reload()">Exit</div>

</div>

<div id="adminContent"></div>

</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[]
let cart=JSON.parse(localStorage.getItem("cart"))||[]
let orders=JSON.parse(localStorage.getItem("orders"))||[]
let users=JSON.parse(localStorage.getItem("users"))||[]

function save(){

localStorage.setItem("products",JSON.stringify(products))
localStorage.setItem("cart",JSON.stringify(cart))
localStorage.setItem("orders",JSON.stringify(orders))
localStorage.setItem("users",JSON.stringify(users))

}

function demo(){

if(products.length>0) return

products=[

{id:1,name:"iPhone 14",price:999,img:"https://picsum.photos/300?1"},
{id:2,name:"Samsung S23",price:850,img:"https://picsum.photos/300?2"},
{id:3,name:"Macbook Pro",price:1800,img:"https://picsum.photos/300?3"},
{id:4,name:"Dell XPS",price:1500,img:"https://picsum.photos/300?4"},
{id:5,name:"Sony Headphones",price:320,img:"https://picsum.photos/300?5"},
{id:6,name:"Apple Watch",price:450,img:"https://picsum.photos/300?6"},
{id:7,name:"Gaming Mouse",price:70,img:"https://picsum.photos/300?7"},
{id:8,name:"Keyboard",price:120,img:"https://picsum.photos/300?8"},
{id:9,name:"Tablet",price:650,img:"https://picsum.photos/300?9"},
{id:10,name:"Smart TV",price:1200,img:"https://picsum.photos/300?10"},
{id:11,name:"Bluetooth Speaker",price:160,img:"https://picsum.photos/300?11"},
{id:12,name:"Power Bank",price:60,img:"https://picsum.photos/300?12"}

]

save()

}

function renderProducts(){

let max=document.getElementById("priceFilter").value

let list=document.getElementById("productList")

list.innerHTML=""

products.filter(p=>p.price<=max).forEach(p=>{

list.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>$${p.price}</p>

<button onclick="addCart(${p.id})">Add to Cart</button>

</div>

`

})

}

function renderHome(){

let home=document.getElementById("featured")

home.innerHTML=""

products.slice(0,4).forEach(p=>{

home.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>$${p.price}</p>

<button onclick="addCart(${p.id})">Add</button>

</div>

`

})

}

function addCart(id){

let p=products.find(x=>x.id==id)

cart.push(p)

save()

updateCart()

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length

let items=document.getElementById("cartItems")

items.innerHTML=""

let total=0

cart.forEach((c,i)=>{

total+=c.price

items.innerHTML+=`

<div>

${c.name} $${c.price}

<button onclick="removeCart(${i})">X</button>

</div>

`

})

document.getElementById("cartTotal").innerText=total

}

function removeCart(i){

cart.splice(i,1)

save()

updateCart()

}

function placeOrder(){

orders.push({

date:new Date().toLocaleString(),

items:[...cart],

status:"Processing"

})

cart=[]

save()

updateCart()

renderOrders()

show("orders")

}

function renderOrders(){

let o=document.getElementById("orderList")

o.innerHTML=""

orders.forEach(order=>{

o.innerHTML+=`

<div class="card">

<h4>${order.date}</h4>

<p>Status: <span class="badge">${order.status}</span></p>

<p>${order.items.length} items</p>

</div>

`

})

}

function show(id){

document.querySelectorAll(".container>div")

.forEach(x=>x.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}

function login(){

let u=document.getElementById("user").value

let p=document.getElementById("pass").value

if(u=="admin" && p=="admin123"){

document.querySelector(".container").classList.add("hidden")

document.getElementById("adminPanel").classList.remove("hidden")

adminPage("dashboard")

return

}

alert("User logged")

}

function adminPage(section){

let c=document.getElementById("adminContent")

if(section=="dashboard"){

let revenue=orders.reduce((t,o)=>t+
o.items.reduce((s,i)=>s+i.price,0),0)

c.innerHTML=`

<h2>Dashboard</h2>

<p>Total Orders: ${orders.length}</p>

<p>Total Revenue: $${revenue}</p>

`

}

if(section=="products"){

c.innerHTML=`

<h2>Products</h2>

<button onclick="addProduct()">Add Product</button>

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Delete</th>

</tr>

${products.map(p=>`

<tr>

<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.price}</td>
<td><button onclick="deleteProduct(${p.id})">X</button></td>

</tr>

`).join("")}

</table>

`

}

if(section=="orders"){

c.innerHTML=`

<h2>Orders</h2>

${orders.map(o=>`

<div class="card">

${o.date} - ${o.items.length} items

</div>

`).join("")}

`

}

}

function deleteProduct(id){

products=products.filter(p=>p.id!=id)

save()

adminPage("products")

}

function addProduct(){

let name=prompt("Name")

let price=prompt("Price")

products.push({

id:Date.now(),

name,

price,

img:"https://picsum.photos/300?random="+Math.random()

})

save()

adminPage("products")

}

document.getElementById("search").oninput=e=>{

let q=e.target.value.toLowerCase()

let list=document.getElementById("productList")

list.innerHTML=""

products.filter(p=>p.name.toLowerCase().includes(q))

.forEach(p=>{

list.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>$${p.price}</p>

<button onclick="addCart(${p.id})">Add</button>

</div>

`

})

}

document.getElementById("priceFilter").oninput=renderProducts

demo()
renderProducts()
renderHome()
updateCart()
renderOrders()

</script>

</body>
</html>
