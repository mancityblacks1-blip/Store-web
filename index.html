<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creative Visual Website</title>

<style>

/* =========================
GLOBAL
========================= */

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

/* =========================
NAVBAR
========================= */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
backdrop-filter:blur(10px);
}

nav h2{
color:#00eaff;
}

nav button{
background:#00eaff;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

/* =========================
HERO
========================= */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
}

.hero h1{
font-size:70px;
background:linear-gradient(90deg,#00eaff,#ff00c8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
font-size:22px;
opacity:0.8;
}

.hero button{
margin-top:25px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:8px;
background:#00eaff;
color:black;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
transform:scale(1.1);
}

/* =========================
GLASS CARDS
========================= */

.section{
padding:120px 10%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{

background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
border-radius:12px;
padding:30px;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
}

/* =========================
FLOATING SHAPES
========================= */

.shape{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:0.6;
animation:float 10s infinite ease-in-out;
}

.shape1{
width:300px;
height:300px;
background:#ff00c8;
top:10%;
left:5%;
}

.shape2{
width:250px;
height:250px;
background:#00eaff;
bottom:10%;
right:5%;
}

.shape3{
width:200px;
height:200px;
background:#ff9900;
top:60%;
left:40%;
}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-60px)}
100%{transform:translateY(0)}

}

/* =========================
SCROLL ANIMATION
========================= */

.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

</style>

</head>

<body>

<nav>

<h2>CreativeSite</h2>

<button>Start</button>

</nav>

<section class="hero">

<div>

<h1>Future Design</h1>

<p>Creative websites that instantly capture attention</p>

<button>Explore</button>

</div>

</section>

<section class="section">

<div class="card fade">
<h3>Creative UI</h3>
<p>Modern user interface with smooth animations</p>
</div>

<div class="card fade">
<h3>Interactive</h3>
<p>Elements react with mouse and scroll</p>
</div>

<div class="card fade">
<h3>Fast</h3>
<p>Optimized and responsive design</p>
</div>

</section>

<div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div>

<script>

/* =========================
SCROLL ANIMATION
========================= */

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("show")

}

})

})

document.querySelectorAll(".fade").forEach(el=>observer.observe(el))

</script>

</body>
</html>
