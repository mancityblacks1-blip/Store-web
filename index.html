<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisionGlass</title>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* ===== NAVBAR ===== */

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#020617;
}

nav h2{
color:#38bdf8;
}

nav button{
background:#38bdf8;
border:none;
padding:10px 20px;
cursor:pointer;
}

/* ===== HERO ===== */

.hero{
height:70vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(135deg,#020617,#1e293b);
}

.hero h1{
font-size:60px;
}

.hero p{
opacity:0.8;
}

/* ===== PRODUCTS ===== */

.products{
padding:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{

background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
transition:0.3s;

}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
}

/* ===== CUSTOMIZER ===== */

.customizer{
display:flex;
flex-direction:column;
align-items:center;
padding:50px;
background:#020617;
}

.controls{
margin-top:20px;
}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
}

/* ===== 3D VIEW ===== */

#viewer{
width:100%;
height:400px;
}

</style>

</head>

<body>

<nav>

<h2>VisionGlass</h2>

<button onclick="openTryOn()">Try On</button>

</nav>

<section class="hero">

<div>

<h1>Find Your Perfect Glasses</h1>

<p>Try glasses online and choose the best frame for your face</p>

</div>

</section>

<section class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1511497584788-876760111969">

<h3>Classic Frame</h3>

<button onclick="selectModel('classic')">Customize</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">

<h3>Modern Frame</h3>

<button onclick="selectModel('modern')">Customize</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f">

<h3>Round Frame</h3>

<button onclick="selectModel('round')">Customize</button>

</div>

</section>

<section class="customizer">

<h2>Customize Your Glasses</h2>

<div id="viewer"></div>

<div class="controls">

<label>Color</label>

<button onclick="changeColor('black')">Black</button>
<button onclick="changeColor('gold')">Gold</button>
<button onclick="changeColor('blue')">Blue</button>

<br><br>

<label>Size</label>

<select onchange="changeSize(this.value)">

<option value="1">Small</option>
<option value="1.3">Medium</option>
<option value="1.6">Large</option>

</select>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/* ===== 3D SCENE ===== */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/400,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,400)

document.getElementById("viewer").appendChild(renderer.domElement)

/* ===== LIGHT ===== */

const light=new THREE.DirectionalLight(0xffffff,1)

light.position.set(0,5,5)

scene.add(light)

/* ===== GLASSES MODEL ===== */

const material=new THREE.MeshStandardMaterial({color:0x000000})

const ring=new THREE.TorusGeometry(1,0.1,16,100)

const left=new THREE.Mesh(ring,material)

left.position.x=-1.2

scene.add(left)

const right=new THREE.Mesh(ring,material)

right.position.x=1.2

scene.add(right)

const bridge=new THREE.Mesh(

new THREE.BoxGeometry(0.5,0.1,0.1),
material

)

scene.add(bridge)

/* ===== CAMERA ===== */

camera.position.z=5

/* ===== ROTATE WITH MOUSE ===== */

let mouseX=0

document.addEventListener("mousemove",e=>{

mouseX=(e.clientX/window.innerWidth-0.5)*2

})

/* ===== ANIMATE ===== */

function animate(){

requestAnimationFrame(animate)

left.rotation.y=mouseX
right.rotation.y=mouseX
bridge.rotation.y=mouseX

renderer.render(scene,camera)

}

animate()

/* ===== COLOR CHANGE ===== */

function changeColor(color){

material.color.set(color)

}

/* ===== SIZE ===== */

function changeSize(scale){

left.scale.set(scale,scale,scale)
right.scale.set(scale,scale,scale)

}

/* ===== MODEL SELECT ===== */

function selectModel(name){

alert("Model selected: "+name)

}

/* ===== TRY ON ===== */

function openTryOn(){

alert("Camera try-on page will open here")

}

</script>

</body>
</html>
