<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Electro Amazon Store</title>

<style>

/* =========================
GLOBAL STYLES
========================= */

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#f3f3f3;
}

/* =========================
HEADER
========================= */

header{
background:#131921;
color:white;
display:flex;
align-items:center;
padding:10px 20px;
gap:20px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#ff9900;
}

.search-bar{
flex:1;
display:flex;
}

.search-bar input{
flex:1;
padding:10px;
border:none;
}

.search-bar button{
background:#febd69;
border:none;
padding:10px 15px;
cursor:pointer;
}

nav{
display:flex;
gap:10px;
}

nav button{
background:#232f3e;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
}

/* =========================
LAYOUT
========================= */

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* =========================
PRODUCT CARD
========================= */

.card{
background:white;
padding:15px;
border-radius:6px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.price{
color:#b12704;
font-weight:bold;
font-size:18px;
}

.rating{
color:#ffa41c;
}

/* =========================
BUTTON
========================= */

.btn{
background:#ffd814;
border:none;
padding:8px;
cursor:pointer;
margin-top:5px;
width:100%;
}

/* =========================
HIDDEN
========================= */

.hidden{
display:none;
}

</style>

</head>

<body>

<header>

<div class="logo">ElectroAmazon</div>

<div class="search-bar">
<input id="searchInput" placeholder="Search electronics">
<button onclick="searchProducts()">Search</button>
</div>

<nav>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('products')">Products</button>
<button onclick="showPage('wishlist')">Wishlist</button>
<button onclick="showPage('cart')">Cart (<span id="cartCount">0</span>)</button>
<button onclick="showPage('orders')">Orders</button>
<button onclick="showPage('login')">Login</button>

</nav>

</header>

<div class="container">

<!-- HOME -->

<div id="home">

<h2>Featured Electronics</h2>

<div class="grid" id="featuredProducts"></div>

</div>

<!-- PRODUCTS -->

<div id="products" class="hidden">

<h2>All Products</h2>

<label>Max Price</label>
<input type="range" id="priceFilter" min="50" max="2000" value="2000">

<div class="grid" id="productGrid"></div>

</div>

<!-- WISHLIST -->

<div id="wishlist" class="hidden">

<h2>Wishlist</h2>

<div class="grid" id="wishlistGrid"></div>

</div>

<!-- CART -->

<div id="cart" class="hidden">

<h2>Shopping Cart</h2>

<div id="cartItems"></div>

<h3>Total: $<span id="cartTotal"></span></h3>

<button class="btn" onclick="showPage('checkout')">Proceed to Checkout</button>

</div>

<!-- CHECKOUT -->

<div id="checkout" class="hidden">

<h2>Checkout</h2>

<select id="paymentMethod">

<option>Visa / Mastercard</option>
<option>InstaPay</option>
<option>Vodafone Cash</option>

</select>

<br><br>

<button class="btn" onclick="placeOrder()">Complete Payment</button>

</div>

<!-- ORDERS -->

<div id="orders" class="hidden">

<h2>Order Tracking</h2>

<div id="ordersList"></div>

</div>

<!-- LOGIN -->

<div id="login" class="hidden">

<h2>Login</h2>

<input id="username" placeholder="username"><br><br>

<input id="password" type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>

</div>

</div>

<script>

/* =========================
DATABASE
========================= */

let products = JSON.parse(localStorage.getItem("products")) || []
let cart = JSON.parse(localStorage.getItem("cart")) || []
let orders = JSON.parse(localStorage.getItem("orders")) || []
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || []

function saveData(){

localStorage.setItem("products",JSON.stringify(products))
localStorage.setItem("cart",JSON.stringify(cart))
localStorage.setItem("orders",JSON.stringify(orders))
localStorage.setItem("wishlist",JSON.stringify(wishlist))

}

/* =========================
GENERATE DEMO PRODUCTS
========================= */

function generateProducts(){

if(products.length>0) return

for(let i=1;i<=30;i++){

products.push({

id:i,
name:"Electronic Product "+i,
price:Math.floor(Math.random()*1500)+100,
rating:Math.floor(Math.random()*5)+1,
stock:Math.floor(Math.random()*50),
img:"https://picsum.photos/300?random="+i

})

}

saveData()

}

/* =========================
PAGE ROUTER
========================= */

function showPage(id){

document.querySelectorAll(".container > div")
.forEach(page => page.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}

/* =========================
RENDER PRODUCTS
========================= */

function renderProducts(){

let grid = document.getElementById("productGrid")

grid.innerHTML=""

let max=document.getElementById("priceFilter").value

products
.filter(p=>p.price<=max)
.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p class="price">$${p.price}</p>

<p class="rating">⭐ ${p.rating}</p>

<button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>

<button onclick="addToWishlist(${p.id})">❤️ Wishlist</button>

</div>

`

})

}

/* =========================
FEATURED
========================= */

function renderFeatured(){

let grid=document.getElementById("featuredProducts")

grid.innerHTML=""

products.slice(0,8).forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p class="price">$${p.price}</p>

<button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>

</div>

`

})

}

/* =========================
SEARCH
========================= */

function searchProducts(){

let q=document.getElementById("searchInput").value.toLowerCase()

let grid=document.getElementById("productGrid")

grid.innerHTML=""

products
.filter(p=>p.name.toLowerCase().includes(q))
.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>$${p.price}</p>

<button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>

</div>

`

})

}

/* =========================
INIT
========================= */

document.getElementById("priceFilter").oninput=renderProducts

generateProducts()

renderProducts()

renderFeatured()
/* =========================
CART SYSTEM
========================= */

function addToCart(id){

let product = products.find(p=>p.id===id)

if(!product) return

cart.push(product)

saveData()

updateCartUI()

alert("Product added to cart")

}

function updateCartUI(){

document.getElementById("cartCount").innerText=cart.length

let cartItems=document.getElementById("cartItems")

if(!cartItems) return

cartItems.innerHTML=""

let total=0

cart.forEach((item,index)=>{

total+=item.price

cartItems.innerHTML+=`

<div class="card">

<h4>${item.name}</h4>

<p>$${item.price}</p>

<button onclick="removeFromCart(${index})">Remove</button>

</div>

`

})

let totalElement=document.getElementById("cartTotal")

if(totalElement) totalElement.innerText=total

}

function removeFromCart(index){

cart.splice(index,1)

saveData()

updateCartUI()

}

/* =========================
WISHLIST SYSTEM
========================= */

function addToWishlist(id){

if(wishlist.includes(id)){

alert("Already in wishlist")

return

}

wishlist.push(id)

saveData()

renderWishlist()

alert("Added to wishlist")

}

function renderWishlist(){

let grid=document.getElementById("wishlistGrid")

if(!grid) return

grid.innerHTML=""

wishlist.forEach(id=>{

let p=products.find(x=>x.id===id)

if(!p) return

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p class="price">$${p.price}</p>

<button onclick="addToCart(${p.id})">Add to Cart</button>

<button onclick="removeWishlist(${p.id})">Remove</button>

</div>

`

})

}

function removeWishlist(id){

wishlist=wishlist.filter(w=>w!==id)

saveData()

renderWishlist()

}

/* =========================
PRODUCT RATINGS
========================= */

function rateProduct(id,stars){

let product=products.find(p=>p.id===id)

if(!product) return

product.rating=stars

saveData()

renderProducts()

}

/* =========================
STOCK MANAGEMENT
========================= */

function reduceStock(id){

let product=products.find(p=>p.id===id)

if(!product) return

if(product.stock>0){

product.stock--

}

saveData()

}

/* =========================
ADVANCED FILTER
========================= */

function filterProducts(){

let max=document.getElementById("priceFilter").value

let grid=document.getElementById("productGrid")

grid.innerHTML=""

products
.filter(p=>p.price<=max)
.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p class="price">$${p.price}</p>

<p>⭐ ${p.rating}</p>

<p>Stock: ${p.stock}</p>

<button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>

<button onclick="addToWishlist(${p.id})">❤️</button>

</div>

`

})

}

document.getElementById("priceFilter").oninput=filterProducts

/* =========================
INITIALIZE UI
========================= */

updateCartUI()

renderWishlist()

filterProducts()
  /* =========================
CHECKOUT SYSTEM
========================= */

function placeOrder(){

if(cart.length===0){

alert("Cart is empty")
return

}

let payment=document.getElementById("paymentMethod").value

let order={

id:Date.now(),

date:new Date().toLocaleString(),

items:[...cart],

payment:payment,

status:"Processing"

}

orders.push(order)

cart=[]

saveData()

updateCartUI()

renderOrders()

showPage("orders")

alert("Order placed successfully")

}

/* =========================
ORDER TRACKING SYSTEM
========================= */

function renderOrders(){

let container=document.getElementById("ordersList")

if(!container) return

container.innerHTML=""

orders.forEach(order=>{

let itemsHTML=""

order.items.forEach(i=>{

itemsHTML+=`

<li>${i.name} - $${i.price}</li>

`

})

container.innerHTML+=`

<div class="card">

<h3>Order #${order.id}</h3>

<p>Date: ${order.date}</p>

<p>Payment: ${order.payment}</p>

<p>Status: <b>${order.status}</b></p>

<ul>${itemsHTML}</ul>

<div class="tracking">

${trackingBar(order.status)}

</div>

</div>

`

})

}

/* =========================
TRACKING BAR
========================= */

function trackingBar(status){

let steps=["Processing","Shipped","Out for Delivery","Delivered"]

let html="<div style='display:flex;gap:10px'>"

steps.forEach(step=>{

let color="gray"

if(steps.indexOf(step)<=steps.indexOf(status)){

color="green"

}

html+=`<div style="padding:5px;background:${color};color:white">${step}</div>`

})

html+="</div>"

return html

}

/* =========================
SIMULATE SHIPPING
========================= */

function simulateShipping(){

orders.forEach(order=>{

if(order.status==="Processing"){

order.status="Shipped"

}

else if(order.status==="Shipped"){

order.status="Out for Delivery"

}

else if(order.status==="Out for Delivery"){

order.status="Delivered"

}

})

saveData()

renderOrders()

}

/* =========================
AUTO SHIPPING UPDATE
========================= */

setInterval(simulateShipping,15000)

/* =========================
ORDER DETAILS MODAL
========================= */

function showOrderDetails(id){

let order=orders.find(o=>o.id===id)

if(!order) return

let items=""

order.items.forEach(i=>{

items+=`${i.name} - $${i.price}<br>`

})

alert(

"Order ID: "+order.id+

"\nStatus: "+order.status+

"\nItems:\n"+items

)

}

/* =========================
ORDER CANCEL
========================= */

function cancelOrder(id){

orders=orders.filter(o=>o.id!==id)

saveData()

renderOrders()

alert("Order cancelled")

}

/* =========================
INIT ORDERS
========================= */

renderOrders()
</script>

</body>
</html>
